        seriesRef2.current.createPriceLine({
          price: blDirection === 'LONG' ? ep * (1 - blStopPct / 100) : ep * (1 + blStopPct / 100),
          color: '#ef4444', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true, title: 'STOP',

        seriesRef2.current.createPriceLine({
          price: blDirection === 'LONG' ? ep * (1 + blTpPct / 100) : ep * (1 - blTpPct / 100),
          color: '#10b981', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true, title: 'TARGET',
        });
        if (chartRef2.current) chartRef2.current.timeScale().scrollToRealTime();
      }

  };

  const candlesElapsed = currentIdx - entryIdx;
  const isFinished = status === 'STOPPED_OUT' || status === 'TARGET_HIT' || status === 'EXPIRED';
  const blIsFinished = blStatus === 'STOPPED_OUT' || blStatus === 'TARGET_HIT' || blStatus === 'EXPIRED';
  const allFinished = compareMode ? (isFinished && blIsFinished) : isFinished;
  const finalPnl = exitPrice ? (direction === 'LONG' ? (exitPrice - parseFloat(entryPrice)) * qty : (parseFloat(entryPrice) - exitPrice) * qty) : 0;
  const finalPnlPct = exitPrice ? (direction === 'LONG' ? ((exitPrice - parseFloat(entryPrice)) / parseFloat(entryPrice)) * 100 : ((parseFloat(entryPrice) - exitPrice) / parseFloat(entryPrice)) * 100) : 0;
  const blFinalPnl = blExitPrice ? (blDirection === 'LONG' ? (blExitPrice - parseFloat(entryPrice)) * qty : (parseFloat(entryPrice) - blExitPrice) * qty) : 0;
  const blFinalPnlPct = blExitPrice ? (blDirection === 'LONG' ? ((blExitPrice - parseFloat(entryPrice)) / parseFloat(entryPrice)) * 100 : ((parseFloat(entryPrice) - blExitPrice) / parseFloat(entryPrice)) * 100) : 0;

  const statusColors = {

                className={`flex-1 py-1.5 text-xs font-semibold transition-all ${direction === 'LONG' ? 'bg-emerald-500/80 text-white' : 'bg-white/[0.03] text-slate-400 hover:bg-white/[0.06]'}`}>LONG</button>
              <button onClick={() => setDirection('SHORT')}
                className={`flex-1 py-1.5 text-xs font-semibold transition-all ${direction === 'SHORT' ? 'bg-rose-500/80 text-white' : 'bg-white/[0.03] text-slate-400 hover:bg-white/[0.06]'}`}>SHORT</button>
            </div>

          <div>

            <input type="number" step="0.01" value={entryPrice} onChange={e => setEntryPrice(e.target.value)}
              placeholder="Auto" className="w-full bg-white/[0.03] border border-white/[0.06] rounded-lg px-2.5 py-1.5 text-xs mono focus:border-sky-400/40 focus:outline-none" />
          </div>
          <div className="grid grid-cols-3 gap-2">

              <input type="number" value={positionSize} onChange={e => setPositionSize(Number(e.target.value))}
                className="w-full bg-white/[0.03] border border-white/[0.06] rounded-lg px-2 py-1.5 text-xs mono focus:border-sky-400/40 focus:outline-none" />
            </div>
            <div>
              <label className="text-[10px] text-slate-500 block mb-0.5">SL %</label>
              <input type="number" step="0.5" value={stopLossPct} onChange={e => setStopLossPct(Number(e.target.value))}

                <option value={5}>5 candles</option>

              </select>

          </div>
          {qty > 0 && parseFloat(entryPrice) > 0 && (
            <div className="grid grid-cols-3 gap-1.5 text-xs">
              <div className="bg-slate-700/50 rounded p-1.5 text-center">
                <div className="text-[10px] text-slate-500">Shares</div>
                <div className="mono font-bold text-slate-200">{qty}</div>

              <div className="bg-slate-700/50 rounded p-1.5 text-center">
                <div className="text-[10px] text-slate-500">Stop</div>
                <div className="mono font-bold text-red-400">${stopPrice.toFixed(2)}</div>

            {loading ? <><Spinner size="w-3 h-3" /> Loading...</> : 'Start Replay'}

          <h3 className="text-[11px] font-medium text-slate-500 uppercase tracking-[0.12em]">Account</h3>
          <div className="grid grid-cols-2 gap-1.5">

            <div className="bg-slate-700/50 rounded p-1.5"><div className="text-[10px] text-slate-500">Day P&L</div><div className={`text-xs font-bold mono ${simAccount.day_pnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>{simAccount.day_pnl >= 0 ? '+' : ''}${simAccount.day_pnl.toLocaleString()}</div></div>

        {signalState && signalState.sub_scores && (
          <div className="bg-white/[0.03] rounded-xl p-3.5 ring-1 ring-white/[0.05] space-y-2">
            <h3 className="text-[11px] font-medium text-slate-500 uppercase tracking-[0.12em]">Signal Breakdown</h3>
            {[
              { key: 'guidance_hedge', label: 'Guidance', weight: '35%' },
              { key: 'analyst_pressure', label: 'Pressure', weight: '15%' },
              { key: 'language_momentum', label: 'Momentum', weight: '50%' },

                <span className="text-green-400">{baselineSignal.positive_count}</span> pos / <span className="text-red-400">{baselineSignal.negative_count}</span> neg

          <div className={`${compareMode ? 'flex-1 border-r border-white/[0.06]' : 'flex-1'} flex flex-col overflow-hidden`}>
            {/* Panel Header */}
            {compareMode && (
              <div className="flex items-center gap-2 px-4 py-1.5 bg-cyan-900/15 border-b border-cyan-800/30">
                <div className="w-2 h-2 rounded-full bg-cyan-400"></div>
                <span className="text-[11px] font-bold text-cyan-300 uppercase tracking-wider">Advanced Model</span>
                <span className={`ml-auto text-[10px] font-bold mono ${signalState?.signal_label === 'LONG' ? 'text-green-400' : signalState?.signal_label === 'SHORT' ? 'text-red-400' : 'text-yellow-400'}`}>
                  {signalState?.signal_label} {signalState?.composite_signal?.toFixed(2)}
                </span>

            <div className="flex items-center gap-3 px-4 py-2 border-b border-white/[0.04] bg-white/[0.015]">
              <div className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${statusColors[status] || statusColors.IDLE}`}>
                {status.replace('_', ' ')}
              </div>
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-slate-500">Price</span>
                <span className={`${compareMode ? 'text-xs' : 'text-sm'} font-black mono text-slate-100`}>${currentPrice.toFixed(2)}</span>
              </div>
              <div className="h-3 w-px bg-white/[0.06]" />
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-slate-500">P&L</span>
                <span className={`${compareMode ? 'text-xs' : 'text-sm'} font-black mono ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  {pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}
                </span>
                <span className={`text-[10px] mono ${pnlPct >= 0 ? 'text-green-400/60' : 'text-red-400/60'}`}>
                  ({pnlPct >= 0 ? '+' : ''}{pnlPct.toFixed(1)}%)
                </span>
              </div>
              {!compareMode && (<>
                <div className="h-3 w-px bg-white/[0.06]" />
                <div className="flex items-center gap-2">
                  <div className="flex items-center gap-1"><span className="text-[10px] text-slate-500">Best</span><span className="text-xs mono font-bold text-green-400">{maxFav >= 0 ? '+' : ''}${maxFav.toFixed(0)}</span></div>
                  <div className="flex items-center gap-1"><span className="text-[10px] text-slate-500">Worst</span><span className="text-xs mono font-bold text-red-400">${maxAdv.toFixed(0)}</span></div>
                </div>
              </>)}
              <div className="ml-auto text-[10px] text-slate-500 mono">
                {candlesElapsed}/{replayWindow}
              </div>
            </div>
            {/* Chart */}
            <div className="flex-1 relative">
              <div ref={chartContainerRef} className="absolute inset-0" />
            </div>
            {/* Result badge below chart when finished */}
            {isFinished && (
              <div className={`flex items-center gap-2 px-4 py-1.5 border-t ${finalPnl >= 0 ? 'bg-green-900/10 border-green-800/30' : 'bg-red-900/10 border-red-800/30'}`}>
                <span className={`text-[10px] font-black uppercase ${finalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  {status === 'TARGET_HIT' ? 'TARGET' : status === 'STOPPED_OUT' ? 'STOPPED' : 'EXPIRED'}
                </span>
                <span className={`text-xs font-black mono ${finalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  {finalPnl >= 0 ? '+' : ''}${finalPnl.toFixed(2)} ({finalPnlPct >= 0 ? '+' : ''}{finalPnlPct.toFixed(1)}%)
                </span>
                <span className="text-[10px] text-slate-500 mono ml-auto">{exitIdx - entryIdx} candles</span>
              </div>
            )}
          </div>

          {/* Panel 2: Baseline Model (only in compare mode) */}
          {compareMode && (
            <div className="flex-1 flex flex-col overflow-hidden">
              {/* Panel Header */}
              <div className="flex items-center gap-2 px-4 py-1.5 bg-amber-900/15 border-b border-amber-800/30">
                <div className="w-2 h-2 rounded-full bg-amber-400"></div>
                <span className="text-[11px] font-bold text-amber-300 uppercase tracking-wider">Baseline: Keyword Sentiment</span>
                <span className={`ml-auto text-[10px] font-bold mono ${baselineSignal?.signal_label === 'LONG' ? 'text-green-400' : baselineSignal?.signal_label === 'SHORT' ? 'text-red-400' : 'text-yellow-400'}`}>
                  {baselineSignal?.signal_label} {baselineSignal?.composite_signal?.toFixed(2)}
                </span>
              </div>
              {/* Baseline P&L Strip */}
              <div className="flex items-center gap-3 px-4 py-2 border-b border-white/[0.04] bg-white/[0.015]">
                <div className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${statusColors[blStatus] || statusColors.IDLE}`}>
                  {blStatus.replace('_', ' ')}
                </div>
                <div className="flex items-center gap-1">
                  <span className="text-[10px] text-slate-500">Price</span>
                  <span className="text-xs font-black mono text-slate-100">${currentPrice.toFixed(2)}</span>
                </div>
                <div className="h-3 w-px bg-white/[0.06]" />
                <div className="flex items-center gap-1">
                  <span className="text-[10px] text-slate-500">P&L</span>
                  <span className={`text-xs font-black mono ${blPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {blPnl >= 0 ? '+' : ''}${blPnl.toFixed(2)}
                  </span>
                  <span className={`text-[10px] mono ${blPnlPct >= 0 ? 'text-green-400/60' : 'text-red-400/60'}`}>
                    ({blPnlPct >= 0 ? '+' : ''}{blPnlPct.toFixed(1)}%)
                  </span>
                </div>
                <div className="ml-auto text-[10px] text-slate-500 mono">
                  {candlesElapsed}/{replayWindow}
                </div>
              </div>
              {/* Baseline Chart */}
              <div className="flex-1 relative">
                <div ref={chartContainerRef2} className="absolute inset-0" />
              </div>
              {/* Baseline result badge */}
              {blIsFinished && (
                <div className={`flex items-center gap-2 px-4 py-1.5 border-t ${blFinalPnl >= 0 ? 'bg-green-900/10 border-green-800/30' : 'bg-red-900/10 border-red-800/30'}`}>
                  <span className={`text-[10px] font-black uppercase ${blFinalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {blStatus === 'TARGET_HIT' ? 'TARGET' : blStatus === 'STOPPED_OUT' ? 'STOPPED' : 'EXPIRED'}
                  </span>
                  <span className={`text-xs font-black mono ${blFinalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {blFinalPnl >= 0 ? '+' : ''}${blFinalPnl.toFixed(2)} ({blFinalPnlPct >= 0 ? '+' : ''}{blFinalPnlPct.toFixed(1)}%)
                  </span>
                  <span className="text-[10px] text-slate-500 mono ml-auto">{blExitIdx - entryIdx} candles</span>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Controls Bar (shared) */}
        <div className="flex items-center gap-3 px-5 py-2.5 border-t border-white/[0.04] bg-white/[0.015]">
          <button onClick={() => setPlaying(!playing)} disabled={!replayActive || allFinished}
            className={`px-5 py-1.5 rounded-lg font-semibold text-xs ${playing ? 'bg-amber-500/80 hover:bg-amber-400/80 text-white' : 'bg-sky-500/80 hover:bg-sky-400/80 text-white'} disabled:bg-white/[0.04] disabled:text-slate-600`}>
            {playing ? 'Pause' : 'Play'}
          </button>
          <button onClick={stepForward} disabled={!replayActive || allFinished || playing}
            className="px-4 py-1.5 rounded-lg text-xs bg-white/[0.06] hover:bg-white/[0.1] text-slate-200 disabled:bg-white/[0.02] disabled:text-slate-600 font-medium">
            Step
          </button>
          <button onClick={resetReplay} disabled={!replayActive}
            className="px-4 py-1.5 rounded-lg text-xs bg-white/[0.06] hover:bg-white/[0.1] text-slate-200 disabled:bg-white/[0.02] disabled:text-slate-600 font-medium">
            Reset
          </button>
          <div className="flex items-center gap-1.5 ml-2">
            <span className="text-[10px] text-slate-400">Speed</span>
            {[1, 2, 5, 10].map(s => (
              <button key={s} onClick={() => setSpeed(s)}
                className={`px-2 py-1 rounded text-[10px] font-semibold ${speed === s ? 'bg-sky-500/80 text-white' : 'bg-white/[0.05] text-slate-400 hover:bg-white/[0.1]'}`}>
                {s}x
              </button>
            ))}
          </div>

          {/* Comparison Summary (when both finished in compare mode) */}
          {compareMode && allFinished && (
            <div className="ml-auto flex items-center gap-3 fade-in">
              <div className={`px-3 py-1 rounded-lg text-[10px] font-black border ${finalPnl > blFinalPnl ? 'text-cyan-300 bg-cyan-900/30 border-cyan-700' : 'text-amber-300 bg-amber-900/30 border-amber-700'}`}>
                {finalPnl > blFinalPnl ? 'Advanced Wins' : finalPnl < blFinalPnl ? 'Baseline Wins' : 'Tie'}
                <span className="ml-2 mono text-slate-400">
                  ${finalPnl.toFixed(0)} vs ${blFinalPnl.toFixed(0)}
                </span>
              </div>
              <button onClick={resetReplay} className="px-3 py-1 bg-cyan-700 hover:bg-cyan-600 rounded-lg text-[10px] font-bold text-white">Again</button>
            </div>
          )}

          {/* Single-mode result */}
          {!compareMode && isFinished && (
            <div className="ml-auto flex items-center gap-3 fade-in">
              <div className={`px-3 py-1 rounded-lg text-xs font-black ${finalPnl >= 0 ? 'text-green-400 bg-green-900/30 border border-green-700' : 'text-red-400 bg-red-900/30 border border-red-700'}`}>
                {status === 'TARGET_HIT' ? 'TARGET HIT' : status === 'STOPPED_OUT' ? 'STOPPED OUT' : 'EXPIRED'}
                <span className="ml-2 mono">{finalPnl >= 0 ? '+' : ''}${finalPnl.toFixed(2)} ({finalPnlPct >= 0 ? '+' : ''}{finalPnlPct.toFixed(1)}%)</span>
              </div>
              <div className="text-[10px] text-slate-500 mono">{exitIdx - entryIdx} candles</div>
              <button onClick={resetReplay} className="px-3 py-1 bg-cyan-700 hover:bg-cyan-600 rounded-lg text-[10px] font-bold text-white">Again</button>
              <button onClick={() => { setReplayActive(false); setCandles([]); setStatus('IDLE'); setEntryPrice(''); }}
                className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded-lg text-[10px] font-bold text-slate-300">New</button>
            </div>
          )}
        </div>
        {error && <div className="mx-4 mb-2 text-xs text-red-400 bg-red-900/20 rounded p-2 border border-red-800">{error}</div>}
      </div>
    </div>
  );
}

// ===================== MAIN APP WITH NAVIGATION =====================

function App() {
  const [activePage, setActivePage] = useState(window.location.pathname === '/simulator' ? 'replay' : 'analysis');
  const [signalState, setSignalState] = useState(null);
  const [simAccount, setSimAccount] = useState({ equity: 100000, cash: 100000, buying_power: 75000, day_pnl: 0 });

  // Handle browser back/forward
  useEffect(() => {
    const handlePop = () => {
      setActivePage(window.location.pathname === '/simulator' ? 'replay' : 'analysis');
    };
    window.addEventListener('popstate', handlePop);
    return () => window.removeEventListener('popstate', handlePop);
  }, []);

  const navigateTo = (page) => {
    setActivePage(page);
    const path = page === 'replay' ? '/simulator' : '/';
    window.history.pushState({}, '', path);
  };

  return (
    <div className="h-screen flex flex-col">
      {/* Navigation Header */}
      <header className="flex-shrink-0">
        <div className="h-[1px] bg-gradient-to-r from-transparent via-sky-400/40 to-transparent"></div>
        <div className="glass-panel border-b border-white/[0.04] px-8 py-3 flex items-center justify-between">
          <div className="flex items-center gap-8">
            <div className="flex items-center gap-3">
              <div>
                <h1 className="text-[22px] font-black text-white tracking-tight leading-tight" style={{fontFamily:'-apple-system,SF Pro Display,system-ui,sans-serif',letterSpacing:'-0.03em'}}>Quant<span className="bg-gradient-to-r from-sky-300 to-blue-400 bg-clip-text text-transparent">E</span><span className="text-[10px] font-medium text-white/30 ml-2 tracking-widest uppercase" style={{letterSpacing:'0.15em'}}>Earnings Alpha</span></h1>
              </div>
            </div>
            <nav className="flex items-center gap-1">
              <button onClick={() => navigateTo('analysis')}
                className={`px-5 py-1.5 rounded-full text-[13px] font-medium transition-all duration-300 ${
                  activePage === 'analysis' ? 'bg-white/[0.08] text-white ring-1 ring-white/[0.08]' : 'text-slate-400 hover:text-white/80 hover:bg-white/[0.04]'
                }`}>Signal Analysis</button>
              <button onClick={() => navigateTo('replay')}
                className={`px-5 py-1.5 rounded-full text-[13px] font-medium transition-all duration-300 ${
                  activePage === 'replay' ? 'bg-white/[0.08] text-white ring-1 ring-white/[0.08]' : 'text-slate-400 hover:text-white/80 hover:bg-white/[0.04]'
                }`}>Replay Simulator</button>
            </nav>
          </div>
        </div>
      </header>

      {/* Page Content */}
      {/* Analysis page stays mounted (hidden via CSS) to preserve state */}
      <div style={{ display: activePage === 'analysis' ? 'contents' : 'none' }}>
        <SignalAnalysisPage signalState={signalState} setSignalState={setSignalState} navigateTo={navigateTo} simAccount={simAccount} setSimAccount={setSimAccount} />
      </div>
      {/* Replay page mounts fresh each time (chart needs visible container) */}
      {activePage === 'replay' && <ReplaySimulatorPage signalState={signalState} setSignalState={setSignalState} simAccount={simAccount} setSimAccount={setSimAccount} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
