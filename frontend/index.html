  const [takeProfitPct, setTakeProfitPct] = useState(10);
  const [interval, setInterval_] = useState('1d');
  const [replayWindow, setReplayWindow] = useState(20);

  // Replay state
  const [candles, setCandles] = useState([]);
  const [replayActive, setReplayActive] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [entryIdx, setEntryIdx] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // P&L state
  const [currentPrice, setCurrentPrice] = useState(0);
  const [pnl, setPnl] = useState(0);
  const [pnlPct, setPnlPct] = useState(0);
  const [maxFav, setMaxFav] = useState(0);
  const [maxAdv, setMaxAdv] = useState(0);
  const [status, setStatus] = useState('IDLE'); // IDLE, OPEN, STOPPED_OUT, TARGET_HIT, EXPIRED
  const [exitPrice, setExitPrice] = useState(null);
  const [exitReason, setExitReason] = useState('');
  const [exitIdx, setExitIdx] = useState(null);

  // Chart refs
  const chartContainerRef = useRef(null);
  const chartRef = useRef(null);
  const seriesRef = useRef(null);
  const timerRef = useRef(null);

  // Load from signal state
  const loadFromSignal = useCallback(() => {
    if (!signalState) return;
    setReplayTicker(signalState.ticker || '');
    setDirection(signalState.signal_label === 'SHORT' ? 'SHORT' : 'LONG');
    if (signalState.entry_price) setEntryPrice(String(signalState.entry_price));
    // Use reported_date (actual earnings report date) or earnings_date
    const eDate = signalState.reported_date || signalState.earnings_date || '';
    if (eDate) setEntryDate(eDate);
    // Apply signal-calculated TP/SL
    if (signalState.calculated_tp) setTakeProfitPct(signalState.calculated_tp);
    if (signalState.calculated_sl) setStopLossPct(signalState.calculated_sl);
  }, [signalState]);

  // Auto-start: when arriving from analysis page with autoStart flag
  const autoStartDone = useRef(false);
  const pendingAutoStart = useRef(false);
  useEffect(() => {
    if (signalState?.autoStart && !autoStartDone.current) {
      autoStartDone.current = true;
      loadFromSignal();
      pendingAutoStart.current = true;
      // Clear the autoStart flag
      setSignalState(prev => prev ? { ...prev, autoStart: false } : prev);
    }
  }, [signalState, loadFromSignal, setSignalState]);

  // Trigger startReplay once form state has settled from auto-fill
  useEffect(() => {
    if (pendingAutoStart.current && replayTicker && entryDate) {
      pendingAutoStart.current = false;
      // Small delay to let chart initialize
      const t = setTimeout(() => startReplay(), 300);
      return () => clearTimeout(t);
    }
  }, [replayTicker, entryDate]);

  // Compute derived values
  const qty = useMemo(() => {
    const ep = parseFloat(entryPrice);
    if (!ep || ep <= 0) return 0;
    return Math.max(1, Math.floor(positionSize / ep));
  }, [positionSize, entryPrice]);

  const stopPrice = useMemo(() => {
    const ep = parseFloat(entryPrice);
    if (!ep) return 0;
    return direction === 'LONG' ? ep * (1 - stopLossPct / 100) : ep * (1 + stopLossPct / 100);
  }, [entryPrice, stopLossPct, direction]);

  const targetPrice = useMemo(() => {
    const ep = parseFloat(entryPrice);
    if (!ep) return 0;
    return direction === 'LONG' ? ep * (1 + takeProfitPct / 100) : ep * (1 - takeProfitPct / 100);
  }, [entryPrice, takeProfitPct, direction]);

  // Initialize chart
  useEffect(() => {
    if (!chartContainerRef.current || typeof LightweightCharts === 'undefined') return;

    const chart = LightweightCharts.createChart(chartContainerRef.current, {
      width: chartContainerRef.current.clientWidth,
      height: 420,
      layout: { background: { color: '#0c1018' }, textColor: '#64748b' },
      grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#334155' },
      timeScale: { borderColor: '#334155', timeVisible: interval === '1h' },
    });

    const series = chart.addCandlestickSeries({
      upColor: '#10b981', downColor: '#ef4444',
      borderUpColor: '#10b981', borderDownColor: '#ef4444',
      wickUpColor: '#10b981', wickDownColor: '#ef4444',
    });

    chartRef.current = chart;
    seriesRef.current = series;

    const handleResize = () => {
      if (chartContainerRef.current) {
        chart.applyOptions({ width: chartContainerRef.current.clientWidth });
      }
    };
    window.addEventListener('resize', handleResize);

    return () => {
      window.removeEventListener('resize', handleResize);
      chart.remove();
      chartRef.current = null;
      seriesRef.current = null;
    };
  }, []);

  // Start replay
  const startReplay = async () => {
    if (!replayTicker || !entryDate) { setError('Ticker and entry date are required.'); return; }
    setError(''); setLoading(true); setReplayActive(false); setPlaying(false);
    setStatus('IDLE'); setExitPrice(null); setExitReason(''); setExitIdx(null);
    setMaxFav(0); setMaxAdv(0);

    if (timerRef.current) clearInterval(timerRef.current);

    try {
      // Calculate date range: 5 context candles before entry + replay window after
      const entryDt = new Date(entryDate + 'T00:00:00');
      const contextDays = interval === '1h' ? 3 : 10;
      const windowDays = interval === '1h' ? replayWindow * 2 : replayWindow + 10;
      const startDt = new Date(entryDt);
      startDt.setDate(startDt.getDate() - contextDays);
      const endDt = new Date(entryDt);
      endDt.setDate(endDt.getDate() + windowDays);

      const startStr = startDt.toISOString().split('T')[0];
      const endStr = endDt.toISOString().split('T')[0];

      const r = await fetch(`${API}/replay/${replayTicker}?start_date=${startStr}&end_date=${endStr}&interval=${interval}`);
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Failed to fetch data'); }
      const data = await r.json();

      if (!data.candles || data.candles.length === 0) throw new Error('No candle data returned');

      // Find entry candle index (first candle on or after entry date)
      let eIdx = 0;
      const entryDateStr = entryDate;
      for (let i = 0; i < data.candles.length; i++) {
        const cDate = data.candles[i].time.split('T')[0];
        if (cDate >= entryDateStr) { eIdx = i; break; }
        eIdx = i;
      }

      // If no explicit entry price, use the open of the entry candle
      const ep = parseFloat(entryPrice);
      const actualEntry = (ep && ep > 0) ? ep : data.candles[eIdx].open;
      setEntryPrice(String(actualEntry));

      setCandles(data.candles);
      setEntryIdx(eIdx);
      setCurrentIdx(eIdx); // Start showing context + entry candle
      setCurrentPrice(data.candles[eIdx].close);
      setReplayActive(true);
      setStatus('OPEN');

      // Draw context candles (before entry) all at once
      if (seriesRef.current) {
        const contextCandles = data.candles.slice(0, eIdx + 1).map(c => ({
          time: c.time,
          open: c.open, high: c.high, low: c.low, close: c.close,
        }));
        seriesRef.current.setData(contextCandles);

        // Add entry marker
        seriesRef.current.setMarkers([{
          time: data.candles[eIdx].time,
          position: 'belowBar', color: '#06b6d4', shape: 'arrowUp',
          text: `ENTRY @ $${actualEntry.toFixed(2)}`,
        }]);

        // Add stop and target price lines
        // Remove old lines by re-creating series options
        if (chartRef.current) {
          // We'll use createPriceLine on the series
          seriesRef.current.createPriceLine({
            price: direction === 'LONG' ? actualEntry * (1 - stopLossPct / 100) : actualEntry * (1 + stopLossPct / 100),
            color: '#ef4444', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true, title: 'STOP',
          });
          seriesRef.current.createPriceLine({
            price: direction === 'LONG' ? actualEntry * (1 + takeProfitPct / 100) : actualEntry * (1 - takeProfitPct / 100),
            color: '#10b981', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true, title: 'TARGET',
          });
        }

        chartRef.current.timeScale().fitContent();
      }

      // Calculate initial P&L
      const initClose = data.candles[eIdx].close;
      const initPnl = direction === 'LONG'
        ? (initClose - actualEntry) * Math.max(1, Math.floor(positionSize / actualEntry))
        : (actualEntry - initClose) * Math.max(1, Math.floor(positionSize / actualEntry));
      const initPnlPct = direction === 'LONG'
        ? ((initClose - actualEntry) / actualEntry) * 100
        : ((actualEntry - initClose) / actualEntry) * 100;
      setPnl(initPnl);
      setPnlPct(initPnlPct);

    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // Step forward one candle
  const stepForward = useCallback(() => {
    if (!replayActive || status !== 'OPEN') return;
    setCurrentIdx(prev => {
      const nextIdx = prev + 1;
      if (nextIdx >= candles.length) {
        setStatus('EXPIRED');
        setExitPrice(candles[candles.length - 1].close);
        setExitReason('Replay window expired');
        setExitIdx(candles.length - 1);
        setPlaying(false);
        return prev;
      }

      // Check max candles from entry
      if (nextIdx - entryIdx > replayWindow) {
        setStatus('EXPIRED');
        setExitPrice(candles[nextIdx - 1].close);
        setExitReason('Replay window expired');
        setExitIdx(nextIdx - 1);
        setPlaying(false);
        return prev;
      }

      const candle = candles[nextIdx];
      const ep = parseFloat(entryPrice);
      const q = Math.max(1, Math.floor(positionSize / ep));

      // Update chart
      if (seriesRef.current) {
        seriesRef.current.update({
          time: candle.time,
          open: candle.open, high: candle.high, low: candle.low, close: candle.close,
        });
      }

      setCurrentPrice(candle.close);

      // Calculate P&L
      const newPnl = direction === 'LONG'
        ? (candle.close - ep) * q
        : (ep - candle.close) * q;
      const newPnlPct = direction === 'LONG'
        ? ((candle.close - ep) / ep) * 100
        : ((ep - candle.close) / ep) * 100;

      setPnl(newPnl);
      setPnlPct(newPnlPct);
      setMaxFav(prev => Math.max(prev, newPnl));
      setMaxAdv(prev => Math.min(prev, newPnl));

      // Check stop loss (at candle close)
      const stopP = direction === 'LONG' ? ep * (1 - stopLossPct / 100) : ep * (1 + stopLossPct / 100);
      const targetP = direction === 'LONG' ? ep * (1 + takeProfitPct / 100) : ep * (1 - takeProfitPct / 100);

      if (direction === 'LONG') {
        if (candle.close <= stopP) {
          setStatus('STOPPED_OUT');
          setExitPrice(candle.close);
          setExitReason(`Stop loss hit at $${candle.close.toFixed(2)}`);
          setExitIdx(nextIdx);
          setPlaying(false);
        } else if (candle.close >= targetP) {
          setStatus('TARGET_HIT');
          setExitPrice(candle.close);
          setExitReason(`Take profit hit at $${candle.close.toFixed(2)}`);
          setExitIdx(nextIdx);
          setPlaying(false);
        }
      } else {
        if (candle.close >= stopP) {
          setStatus('STOPPED_OUT');
          setExitPrice(candle.close);
          setExitReason(`Stop loss hit at $${candle.close.toFixed(2)}`);
          setExitIdx(nextIdx);
          setPlaying(false);
        } else if (candle.close <= targetP) {
          setStatus('TARGET_HIT');
          setExitPrice(candle.close);
          setExitReason(`Take profit hit at $${candle.close.toFixed(2)}`);
          setExitIdx(nextIdx);
          setPlaying(false);
        }
      }

      return nextIdx;
    });
  }, [replayActive, status, candles, entryIdx, entryPrice, direction, positionSize, stopLossPct, takeProfitPct, replayWindow]);

  // Play/pause timer
  useEffect(() => {
    if (playing && status === 'OPEN') {
      const ms = Math.max(100, 1000 / speed);
      timerRef.current = window.setInterval(stepForward, ms);
    } else {
      if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    }
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [playing, speed, stepForward, status]);

  // Page Visibility API — pause when tab hidden
  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden && playing) setPlaying(false);
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [playing]);

  // Reset replay
  const resetReplay = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setPlaying(false);
    setStatus('OPEN');
    setExitPrice(null);
    setExitReason('');
    setExitIdx(null);
    setMaxFav(0);
    setMaxAdv(0);
    setCurrentIdx(entryIdx);

    if (seriesRef.current && candles.length > 0) {
      const ep = parseFloat(entryPrice);
      const contextCandles = candles.slice(0, entryIdx + 1).map(c => ({
        time: c.time, open: c.open, high: c.high, low: c.low, close: c.close,
      }));
      seriesRef.current.setData(contextCandles);
      setCurrentPrice(candles[entryIdx].close);
      const initPnl = direction === 'LONG'
        ? (candles[entryIdx].close - ep) * qty
        : (ep - candles[entryIdx].close) * qty;
      setPnl(initPnl);
      setPnlPct(direction === 'LONG'
        ? ((candles[entryIdx].close - ep) / ep) * 100
        : ((ep - candles[entryIdx].close) / ep) * 100);
      if (chartRef.current) chartRef.current.timeScale().fitContent();
    }
  };

  const candlesElapsed = currentIdx - entryIdx;
  const isFinished = status === 'STOPPED_OUT' || status === 'TARGET_HIT' || status === 'EXPIRED';
  const finalPnl = exitPrice ? (direction === 'LONG' ? (exitPrice - parseFloat(entryPrice)) * qty : (parseFloat(entryPrice) - exitPrice) * qty) : 0;
  const finalPnlPct = exitPrice ? (direction === 'LONG' ? ((exitPrice - parseFloat(entryPrice)) / parseFloat(entryPrice)) * 100 : ((parseFloat(entryPrice) - exitPrice) / parseFloat(entryPrice)) * 100) : 0;

  const statusColors = {
    IDLE: 'text-slate-400 bg-slate-800', OPEN: 'text-cyan-400 bg-cyan-900/30 border-cyan-700',
    STOPPED_OUT: 'text-red-400 bg-red-900/30 border-red-700',
    TARGET_HIT: 'text-green-400 bg-green-900/30 border-green-700',
    EXPIRED: 'text-yellow-400 bg-yellow-900/30 border-yellow-700',
  };

  return (
    <div className="flex-1 flex flex-col overflow-y-auto">
      {/* Signal banner — only shows when signal data exists but not auto-starting */}
      {signalState && signalState.ticker && !replayActive && !loading && status === 'IDLE' && (
        <div className="mx-4 mt-3 p-3 bg-cyan-900/20 border border-cyan-800 rounded-lg flex items-center justify-between">
          <div className="text-xs text-cyan-300">
            Signal from <span className="font-bold">{signalState.ticker} {signalState.quarter}</span> —
            <span className={`font-bold ml-1 ${signalState.signal_label === 'LONG' ? 'text-green-400' : signalState.signal_label === 'SHORT' ? 'text-red-400' : 'text-yellow-400'}`}>{signalState.signal_label} {signalState.composite_signal?.toFixed(2)}</span>
            {signalState.entry_price && <> @ ${signalState.entry_price}</>}
          </div>
          <button onClick={loadFromSignal} className="px-3 py-1 bg-cyan-700 hover:bg-cyan-600 rounded text-xs font-bold text-white">Load Signal Data</button>
        </div>
      )}

      {/* TOP SECTION — Trade Setup */}
      <div className="p-4">
        <div className="bg-white/[0.03] rounded-2xl p-6 ring-1 ring-white/[0.05] premium-shadow-lg">
          <h2 className="text-[13px] font-medium text-slate-400 uppercase tracking-[0.14em] mb-5">Trade Setup</h2>
          <div className="grid grid-cols-2 gap-6">
            {/* Left inputs */}
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Ticker</label>
                  <input type="text" value={replayTicker} onChange={e => setReplayTicker(e.target.value.toUpperCase())}
                    placeholder="NVDA" className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm mono focus:border-sky-400/40 focus:outline-none" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Entry Date</label>
                  <input type="date" value={entryDate} onChange={e => setEntryDate(e.target.value)}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm focus:border-sky-400/40 focus:outline-none" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Direction</label>
                  <div className="flex rounded-xl overflow-hidden ring-1 ring-white/[0.06]">
                    <button onClick={() => setDirection('LONG')}
                      className={`flex-1 py-2 text-sm font-semibold transition-all ${direction === 'LONG' ? 'bg-emerald-500/80 text-white' : 'bg-white/[0.03] text-slate-400 hover:bg-white/[0.06]'}`}>LONG</button>
                    <button onClick={() => setDirection('SHORT')}
                      className={`flex-1 py-2 text-sm font-semibold transition-all ${direction === 'SHORT' ? 'bg-rose-500/80 text-white' : 'bg-white/[0.03] text-slate-400 hover:bg-white/[0.06]'}`}>SHORT</button>
                  </div>
                </div>
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Entry Price (auto if blank)</label>
                  <input type="number" step="0.01" value={entryPrice} onChange={e => setEntryPrice(e.target.value)}
                    placeholder="Auto-fill from data" className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm mono focus:border-sky-400/40 focus:outline-none" />
                </div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Position ($)</label>
                  <input type="number" value={positionSize} onChange={e => setPositionSize(Number(e.target.value))}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm mono focus:border-sky-400/40 focus:outline-none" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Stop Loss %</label>
                  <input type="number" step="0.5" value={stopLossPct} onChange={e => setStopLossPct(Number(e.target.value))}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm mono focus:border-sky-400/40 focus:outline-none" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Take Profit %</label>
                  <input type="number" step="0.5" value={takeProfitPct} onChange={e => setTakeProfitPct(Number(e.target.value))}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm mono focus:border-sky-400/40 focus:outline-none" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Interval</label>
                  <select value={interval} onChange={e => setInterval_(e.target.value)}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm focus:border-sky-400/40 focus:outline-none">
                    <option value="1d">Daily Candles</option>
                    <option value="1h">Hourly Candles</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs text-slate-400 block mb-1">Replay Window</label>
                  <select value={replayWindow} onChange={e => setReplayWindow(Number(e.target.value))}
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl px-3 py-2 text-sm focus:border-sky-400/40 focus:outline-none">
                    <option value={5}>5 candles</option>
                    <option value={10}>10 candles</option>
                    <option value={20}>20 candles</option>
                  </select>
                </div>
              </div>
            </div>
            {/* Right — signal info + start button */}
            <div className="flex flex-col justify-between">
              {signalState && signalState.ticker && (
                <div className="space-y-2 mb-4">
                  <div className="flex items-center gap-2">
                    <span className={`px-3 py-1 rounded-full text-sm font-bold ${
                      signalState.signal_label === 'LONG' ? 'bg-green-900/50 text-green-400 border border-green-600'
                      : signalState.signal_label === 'SHORT' ? 'bg-red-900/50 text-red-400 border border-red-600'
                      : 'bg-yellow-900/50 text-yellow-400 border border-yellow-600'
                    }`}>{signalState.signal_label} {signalState.composite_signal?.toFixed(2)}</span>
                    <span className="text-xs text-slate-400">Confidence: {((signalState.confidence || 0) * 100).toFixed(0)}%</span>
                  </div>
                  {signalState.one_line_summary && <p className="text-xs text-slate-400 italic">{signalState.one_line_summary}</p>}
                </div>
              )}
              {!signalState?.ticker && (
                <div className="text-xs text-slate-500 mb-4 p-3 bg-slate-800 rounded border border-slate-700">
                  No signal data loaded. Run an analysis on the Signal Analysis page first, or manually enter trade parameters.
                </div>
              )}
              <div className="space-y-3">
                {qty > 0 && parseFloat(entryPrice) > 0 && (
                  <div className="grid grid-cols-3 gap-2 text-xs">
                    <div className="bg-slate-700/50 rounded p-2 text-center">
                      <div className="text-slate-500">Shares</div>
                      <div className="mono font-bold text-slate-200">{qty}</div>
                    </div>
                    <div className="bg-slate-700/50 rounded p-2 text-center">
                      <div className="text-slate-500">Stop</div>
                      <div className="mono font-bold text-red-400">${stopPrice.toFixed(2)}</div>
                    </div>
                    <div className="bg-slate-700/50 rounded p-2 text-center">
                      <div className="text-slate-500">Target</div>
                      <div className="mono font-bold text-green-400">${targetPrice.toFixed(2)}</div>
                    </div>
                  </div>
                )}
                <button onClick={startReplay} disabled={loading || !replayTicker || !entryDate}
                  className="w-full px-4 py-3 bg-gradient-to-b from-sky-400 to-sky-500 hover:from-sky-300 hover:to-sky-400 disabled:bg-white/[0.04] disabled:text-slate-600 disabled:from-transparent disabled:to-transparent rounded-2xl font-semibold text-sm text-white transition-all glow-pulse shadow-lg shadow-sky-500/20 flex items-center justify-center gap-2">
                  {loading ? <><Spinner /> Loading Data...</> : 'Start Replay'}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* BOTTOM SECTION — Replay Canvas */}
      <div className="flex-1 px-4 pb-4 flex gap-4">
        {/* Chart + Controls */}
        <div className="flex-1 flex flex-col">
          <div className="bg-white/[0.02] rounded-2xl ring-1 ring-white/[0.05] premium-shadow-lg flex-1 flex flex-col overflow-hidden">
            <div ref={chartContainerRef} className="flex-1 min-h-[420px]" />
            {/* Replay controls */}
            <div className="flex items-center gap-3 px-5 py-3.5 border-t border-white/[0.04] glass-panel">
              <button onClick={() => setPlaying(!playing)} disabled={!replayActive || isFinished}
                className={`px-5 py-1.5 rounded-xl font-semibold text-sm ${playing ? 'bg-amber-500/80 hover:bg-amber-400/80 text-white' : 'bg-sky-500/80 hover:bg-sky-400/80 text-white'} disabled:bg-white/[0.04] disabled:text-slate-600`}>
                {playing ? 'Pause' : 'Play'}
              </button>
              <button onClick={stepForward} disabled={!replayActive || isFinished || playing}
                className="px-4 py-1.5 rounded-xl text-sm bg-white/[0.06] hover:bg-white/[0.1] text-slate-200 disabled:bg-white/[0.02] disabled:text-slate-600 font-medium">
                Step
              </button>
              <button onClick={resetReplay} disabled={!replayActive}
                className="px-4 py-1.5 rounded-xl text-sm bg-white/[0.06] hover:bg-white/[0.1] text-slate-200 disabled:bg-white/[0.02] disabled:text-slate-600 font-medium">
                Reset
              </button>
              <div className="flex items-center gap-2 ml-4">
                <span className="text-xs text-slate-400">Speed:</span>
                {[1, 2, 5, 10].map(s => (
                  <button key={s} onClick={() => setSpeed(s)}
                    className={`px-2.5 py-1 rounded-lg text-xs font-semibold ${speed === s ? 'bg-sky-500/80 text-white' : 'bg-white/[0.05] text-slate-400 hover:bg-white/[0.1]'}`}>
                    {s}x
                  </button>
                ))}
              </div>
              <div className="ml-auto text-xs text-slate-500 mono">
                Candle {candlesElapsed} / {replayWindow}
              </div>
            </div>
          </div>
          {error && <div className="mt-2 text-xs text-red-400 bg-red-900/20 rounded p-2 border border-red-800">{error}</div>}
        </div>

        {/* Live P&L Sidebar */}
        <div className="w-60 flex flex-col gap-3">
          {/* Signal Context — sub-scores from analysis */}
          {signalState && signalState.sub_scores && (
            <div className="bg-white/[0.03] rounded-2xl p-4 ring-1 ring-white/[0.05] premium-shadow space-y-2.5">
              <div className="flex items-center gap-2">
                <div className="w-1 h-3 bg-cyan-500 rounded-full"></div>
                <span className="text-xs font-bold text-slate-300 uppercase tracking-wider">Signal Breakdown</span>
              </div>
              {[
                { key: 'guidance_hedge', label: 'Guidance', weight: '35%' },
                { key: 'analyst_pressure', label: 'Analyst Pressure', weight: '15%' },
                { key: 'language_momentum', label: 'Language', weight: '50%' },
              ].map(({ key, label, weight }) => {
                const d = signalState.sub_scores[key];
                if (!d) return null;
                const s = d.score || 0;
                const pct = ((s + 1) / 2) * 100;
                const color = s > 0.15 ? '#10b981' : s < -0.15 ? '#ef4444' : '#f59e0b';
                return (
                  <div key={key}>
                    <div className="flex justify-between text-xs">
                      <span className="text-slate-500">{label} <span className="text-slate-600">({weight})</span></span>
                      <span className="mono font-bold" style={{ color }}>{s > 0 ? '+' : ''}{s.toFixed(2)}</span>
                    </div>
                    <div className="h-1 bg-slate-700 rounded mt-0.5">
                      <div className="h-full rounded" style={{ width: `${pct}%`, background: color }} />
                    </div>
                  </div>
                );
              })}
              {signalState.sub_scores.earnings_surprise && (
                <div>
                  <div className="flex justify-between text-xs">
                    <span className="text-slate-500">EPS Surprise <span className="text-slate-600">(conf.)</span></span>
                    <span className="mono font-bold" style={{ color: (signalState.sub_scores.earnings_surprise.score || 0) > 0 ? '#10b981' : '#ef4444' }}>
                      {(signalState.sub_scores.earnings_surprise.score || 0) > 0 ? '+' : ''}{(signalState.sub_scores.earnings_surprise.score || 0).toFixed(2)}
                    </span>
                  </div>
                  {signalState.sub_scores.earnings_surprise.surprise_pct != null && (
                    <div className="text-xs text-slate-600 mono mt-0.5">
                      {signalState.sub_scores.earnings_surprise.beat ? 'Beat' : 'Missed'} by {Math.abs(signalState.sub_scores.earnings_surprise.surprise_pct).toFixed(1)}%
                    </div>
                  )}
                </div>
              )}
              {signalState.calibration && (
                <div className="pt-1 border-t border-slate-700 mt-1">
                  <div className="text-xs text-slate-500">Expected Move</div>
                  <div className="text-xs mono text-cyan-400 font-bold">{signalState.calibration.expected_move || 'N/A'}</div>
                  <div className="text-xs text-slate-600 mt-0.5">Accuracy: {signalState.calibration.historical_accuracy || 'N/A'}</div>
                </div>
              )}
            </div>
          )}
          <div className="bg-white/[0.03] rounded-2xl p-5 ring-1 ring-white/[0.05] premium-shadow space-y-4">
            <div className={`text-center px-3 py-2 rounded-full text-xs font-bold uppercase tracking-[0.1em] ring-1 ring-white/[0.06] ${statusColors[status] || statusColors.IDLE}`}>
              {status.replace('_', ' ')}
            </div>
            <div className="text-center py-1">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide">Current Price</div>
              <div className="text-2xl font-black mono text-slate-100">${currentPrice.toFixed(2)}</div>
            </div>
            <div className={`rounded-lg p-2.5 text-center ${pnl >= 0 ? 'bg-green-500/5 border border-green-500/15' : 'bg-red-500/5 border border-red-500/15'}`}>
              <div className="text-[10px] text-slate-500 uppercase tracking-wide">Unrealized P&L</div>
              <div className={`text-xl font-black mono ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                {pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}
              </div>
              <div className={`text-sm mono font-bold ${pnlPct >= 0 ? 'text-green-400/70' : 'text-red-400/70'}`}>
                {pnlPct >= 0 ? '+' : ''}{pnlPct.toFixed(2)}%
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div className="bg-slate-900/40 rounded-lg p-1.5 text-center">
                <div className="text-[10px] text-slate-500">Best</div>
                <div className="text-xs font-bold mono text-green-400">{maxFav >= 0 ? '+' : ''}${maxFav.toFixed(2)}</div>
              </div>
              <div className="bg-slate-900/40 rounded-lg p-1.5 text-center">
                <div className="text-[10px] text-slate-500">Worst</div>
                <div className="text-xs font-bold mono text-red-400">{maxAdv <= 0 ? '' : '+'}${maxAdv.toFixed(2)}</div>
              </div>
            </div>
            <div className="flex items-center justify-between px-1">
              <span className="text-[10px] text-slate-500 uppercase">Candles</span>
              <span className="text-sm font-bold mono text-slate-200">{candlesElapsed} / {replayWindow}</span>
            </div>
          </div>

          {/* Trade result card */}
          {isFinished && (
            <div className={`fade-in rounded-xl p-4 border space-y-2 ${finalPnl >= 0 ? 'bg-green-900/20 border-green-700' : 'bg-red-900/20 border-red-700'}`}>
              <div className={`text-center text-lg font-black ${finalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                {status === 'TARGET_HIT' ? 'TARGET HIT' : status === 'STOPPED_OUT' ? 'STOPPED OUT' : 'EXPIRED'}
              </div>
              <div className="text-xs space-y-1 text-slate-300">
                <div className="flex justify-between"><span className="text-slate-500">Entry:</span><span className="mono">${parseFloat(entryPrice).toFixed(2)}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Exit:</span><span className="mono">${exitPrice?.toFixed(2)}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">P&L:</span>
                  <span className={`mono font-bold ${finalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {finalPnl >= 0 ? '+' : ''}${finalPnl.toFixed(2)} ({finalPnlPct >= 0 ? '+' : ''}{finalPnlPct.toFixed(2)}%)
                  </span>
                </div>
                <div className="flex justify-between"><span className="text-slate-500">Duration:</span><span className="mono">{exitIdx - entryIdx} candles</span></div>
              </div>
              <div className="space-y-1.5 pt-1">
                <button onClick={resetReplay} className="w-full py-1.5 bg-cyan-700 hover:bg-cyan-600 rounded text-xs font-bold text-white">Replay Again</button>
                <button onClick={() => { setReplayActive(false); setCandles([]); setStatus('IDLE'); setEntryPrice(''); }}
                  className="w-full py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-xs font-bold text-slate-300">Try Different Params</button>
              </div>
            </div>
          )}

          <div className="text-xs text-slate-600 text-center mt-auto pt-2">
            Simulated results using historical data. Not financial advice.
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== MAIN APP WITH NAVIGATION =====================

function App() {
  const [activePage, setActivePage] = useState(window.location.pathname === '/simulator' ? 'replay' : 'analysis');
  const [signalState, setSignalState] = useState(null);

  // Handle browser back/forward
  useEffect(() => {
    const handlePop = () => {
      setActivePage(window.location.pathname === '/simulator' ? 'replay' : 'analysis');
    };
    window.addEventListener('popstate', handlePop);
    return () => window.removeEventListener('popstate', handlePop);
  }, []);

  const navigateTo = (page) => {
    setActivePage(page);
    const path = page === 'replay' ? '/simulator' : '/';
    window.history.pushState({}, '', path);
  };

  return (
    <div className="h-screen flex flex-col">
      {/* Navigation Header */}
      <header className="flex-shrink-0">
        <div className="h-[1px] bg-gradient-to-r from-transparent via-sky-400/40 to-transparent"></div>
        <div className="glass-panel border-b border-white/[0.04] px-8 py-3 flex items-center justify-between">
          <div className="flex items-center gap-8">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 bg-gradient-to-br from-sky-300 to-blue-500 rounded-xl flex items-center justify-center font-black text-white text-[10px] tracking-tight shadow-lg shadow-sky-500/25">EA</div>
              <div>
                <h1 className="text-[15px] font-semibold text-white/90 tracking-tight leading-tight">Earnings Alpha Scanner</h1>
              </div>
            </div>
            <nav className="flex items-center gap-1">
              <button onClick={() => navigateTo('analysis')}
                className={`px-5 py-1.5 rounded-full text-[13px] font-medium transition-all duration-300 ${
                  activePage === 'analysis' ? 'bg-white/[0.08] text-white ring-1 ring-white/[0.08]' : 'text-slate-400 hover:text-white/80 hover:bg-white/[0.04]'
                }`}>Signal Analysis</button>
              <button onClick={() => navigateTo('replay')}
                className={`px-5 py-1.5 rounded-full text-[13px] font-medium transition-all duration-300 ${
                  activePage === 'replay' ? 'bg-white/[0.08] text-white ring-1 ring-white/[0.08]' : 'text-slate-400 hover:text-white/80 hover:bg-white/[0.04]'
                }`}>Replay Simulator</button>
            </nav>
          </div>
        </div>
      </header>

      {/* Page Content */}
      {/* Analysis page stays mounted (hidden via CSS) to preserve state */}
      <div style={{ display: activePage === 'analysis' ? 'contents' : 'none' }}>
        <SignalAnalysisPage signalState={signalState} setSignalState={setSignalState} navigateTo={navigateTo} />
      </div>
      {/* Replay page mounts fresh each time (chart needs visible container) */}
      {activePage === 'replay' && <ReplaySimulatorPage signalState={signalState} setSignalState={setSignalState} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
